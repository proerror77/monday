# HFT System Docker Compose Stack
# 符合 Agno 官方規範的多 workspace 統一管理配置
# 基於 GitHub Issue #2661 的官方建議：手動創建 Docker Compose 是支持的方法

services:
  # =============================================================================
  # Infrastructure Services (Shared)
  # =============================================================================
  
  hft-redis:
    image: redis:7-alpine
    container_name: hft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hft_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hft-shared

  hft-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: hft-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - hft_clickhouse_data:/var/lib/clickhouse
      - ./rust_hft/clickhouse_config.xml:/etc/clickhouse-server/config.xml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hft-shared
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""

  # =============================================================================
  # HFT Master Workspace (Port: 8504)
  # =============================================================================
  
  hft-master-db:
    image: pgvector/pgvector:pg16
    container_name: hft-master-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - hft_master_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hft-master

  hft-master-ui:
    build:
      context: ./hft-master-workspace
      dockerfile: Dockerfile
    image: local/hft-master:dev
    container_name: hft-master-ui
    restart: unless-stopped
    ports:
      - "8504:8504"
    volumes:
      - ./hft-master-workspace:/app
    environment:
      RUNTIME_ENV: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      AGNO_MONITOR: "True"
      AGNO_API_KEY: ${AGNO_API_KEY}
      DB_HOST: hft-master-db
      DB_PORT: 5432
      DB_USER: ai
      DB_PASS: ai
      DB_DATABASE: ai
      WAIT_FOR_DB: "True"
      MIGRATE_DB: "True"
    command: ["streamlit", "run", "ui/Home.py", "--server.port", "8504", "--server.headless", "true"]
    depends_on:
      hft-master-db:
        condition: service_healthy
    networks:
      - hft-master
      - hft-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8504/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hft-master-api:
    image: local/hft-master:dev
    container_name: hft-master-api
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./hft-master-workspace:/app
    environment:
      RUNTIME_ENV: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      AGNO_MONITOR: "True"
      AGNO_API_KEY: ${AGNO_API_KEY}
      DB_HOST: hft-master-db
      DB_PORT: 5432
      DB_USER: ai
      DB_PASS: ai
      DB_DATABASE: ai
      WAIT_FOR_DB: "True"
      MIGRATE_DB: "True"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    depends_on:
      hft-master-db:
        condition: service_healthy
    networks:
      - hft-master
      - hft-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # HFT Operations Workspace (Port: 8503)
  # =============================================================================
  
  hft-ops-db:
    image: pgvector/pgvector:pg16
    container_name: hft-ops-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - hft_ops_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hft-ops

  hft-ops-ui:
    build:
      context: ./hft-ops-workspace
      dockerfile: Dockerfile
    image: local/hft-ops:dev
    container_name: hft-ops-ui
    restart: unless-stopped
    ports:
      - "8503:8503"
    volumes:
      - ./hft-ops-workspace:/app
    environment:
      RUNTIME_ENV: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      AGNO_MONITOR: "True"
      AGNO_API_KEY: ${AGNO_API_KEY}
      DB_HOST: hft-ops-db
      DB_PORT: 5432
      DB_USER: ai
      DB_PASS: ai
      DB_DATABASE: ai
      WAIT_FOR_DB: "True"
      MIGRATE_DB: "True"
    command: ["streamlit", "run", "ui/Home.py", "--server.port", "8503", "--server.headless", "true"]
    depends_on:
      hft-ops-db:
        condition: service_healthy
      hft-redis:
        condition: service_healthy
    networks:
      - hft-ops
      - hft-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8503/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hft-ops-api:
    image: local/hft-ops:dev
    container_name: hft-ops-api
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - ./hft-ops-workspace:/app
    environment:
      RUNTIME_ENV: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      AGNO_MONITOR: "True"
      AGNO_API_KEY: ${AGNO_API_KEY}
      DB_HOST: hft-ops-db
      DB_PORT: 5432
      DB_USER: ai
      DB_PASS: ai
      DB_DATABASE: ai
      WAIT_FOR_DB: "True"
      MIGRATE_DB: "True"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload"]
    depends_on:
      hft-ops-db:
        condition: service_healthy
      hft-redis:
        condition: service_healthy
    networks:
      - hft-ops
      - hft-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # HFT ML Workspace (Port: 8502)
  # =============================================================================
  
  hft-ml-db:
    image: pgvector/pgvector:pg16
    container_name: hft-ml-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - hft_ml_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hft-ml

  hft-ml-ui:
    build:
      context: ./hft-ml-workspace
      dockerfile: Dockerfile
    image: local/hft-ml:dev
    container_name: hft-ml-ui
    restart: unless-stopped
    ports:
      - "8502:8502"
    volumes:
      - ./hft-ml-workspace:/app
    environment:
      RUNTIME_ENV: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      AGNO_MONITOR: "True"
      AGNO_API_KEY: ${AGNO_API_KEY}
      DB_HOST: hft-ml-db
      DB_PORT: 5432
      DB_USER: ai
      DB_PASS: ai
      DB_DATABASE: ai
      WAIT_FOR_DB: "True"
      MIGRATE_DB: "True"
    command: ["streamlit", "run", "ui/Home.py", "--server.port", "8502", "--server.headless", "true"]
    depends_on:
      hft-ml-db:
        condition: service_healthy
      hft-clickhouse:
        condition: service_healthy
    networks:
      - hft-ml
      - hft-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hft-ml-api:
    image: local/hft-ml:dev
    container_name: hft-ml-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./hft-ml-workspace:/app
    environment:
      RUNTIME_ENV: dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      AGNO_MONITOR: "True"
      AGNO_API_KEY: ${AGNO_API_KEY}
      DB_HOST: hft-ml-db
      DB_PORT: 5432
      DB_USER: ai
      DB_PASS: ai
      DB_DATABASE: ai
      WAIT_FOR_DB: "True"
      MIGRATE_DB: "True"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    depends_on:
      hft-ml-db:
        condition: service_healthy
      hft-clickhouse:
        condition: service_healthy
    networks:
      - hft-ml
      - hft-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  hft-shared:
    driver: bridge
    name: hft-shared
  hft-master:
    driver: bridge
    name: hft-master
  hft-ops:
    driver: bridge
    name: hft-ops
  hft-ml:
    driver: bridge
    name: hft-ml

# =============================================================================
# Volumes
# =============================================================================
volumes:
  hft_redis_data:
    driver: local
  hft_clickhouse_data:
    driver: local
  hft_master_db_data:
    driver: local
  hft_ops_db_data:
    driver: local
  hft_ml_db_data:
    driver: local