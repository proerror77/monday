[workspace]
name = "hft-master-workspace"
version = "1.0.0"
description = "HFT System Master Controller - Agno Workspace"

[workspace.settings]
# 基本配置
default_env = "dev"
log_level = "INFO"

# HFT 系統配置
[workspace.hft]
project_root = "/Users/proerror/Documents/monday"
rust_hft_path = "/Users/proerror/Documents/monday/rust_hft"
ml_workspace_path = "/Users/proerror/Documents/monday/ml_workspace"
ops_workspace_path = "/Users/proerror/Documents/monday/ops_workspace"

# 基礎設施配置
[workspace.infrastructure]
redis_host = "localhost"
redis_port = 6379
clickhouse_url = "http://localhost:8123"
grpc_port = 50051

# 系統監控配置
[workspace.monitoring]
health_check_interval = 30
enable_ai_analysis = true
ai_model = "qwen2.5:3b"
dashboard_refresh_interval = 3

# 子系統控制
[workspace.subsystems]
enable_rust_core = true
enable_ml_workspace = true
enable_ops_workspace = true

# 啟動配置
[workspace.startup]
sequence = ["infrastructure", "rust_core", "ml_workspace", "ops_workspace"]
timeout = 60
max_restarts = 3