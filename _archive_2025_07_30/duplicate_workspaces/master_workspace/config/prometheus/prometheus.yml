# Prometheus Configuration for HFT System
# =======================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Rust HFT Core metrics
  - job_name: 'rust-hft'
    scrape_interval: 5s  # High frequency for trading metrics
    static_configs:
      - targets: ['rust-hft:8080']
    metrics_path: '/metrics'
    scrape_timeout: 4s

  # Master Workspace infrastructure metrics
  - job_name: 'master-workspace'
    static_configs:
      - targets: ['master-workspace:8090']
    metrics_path: '/metrics'

  # Redis metrics (using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    # Note: Requires redis_exporter sidecar

  # ClickHouse metrics
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
    metrics_path: '/metrics'

  # Docker container metrics (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    # Note: Requires cAdvisor container

  # Node exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    # Note: Requires node_exporter container

  # Python workspace metrics
  - job_name: 'ops-workspace'
    static_configs:
      - targets: ['ops-workspace:8091']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'ml-workspace'
    static_configs:
      - targets: ['ml-workspace:8092']
    metrics_path: '/metrics'
    scrape_interval: 60s

# Remote write configuration (optional, for long-term storage)
