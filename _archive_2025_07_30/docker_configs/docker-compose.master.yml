# HFT系統Master Orchestrator Docker配置
# 統一管理L0基礎設施 + L1核心引擎 + L2運維 + L3機器學習
version: '3.8'

networks:
  hft_infrastructure:
    driver: bridge
    name: hft_infrastructure
  hft_internal:
    driver: bridge
    name: hft_internal
  hft_monitoring:
    driver: bridge
    name: hft_monitoring

volumes:
  clickhouse_data:
    name: hft_clickhouse_data
  redis_data:
    name: hft_redis_data
  prometheus_data:
    name: hft_prometheus_data
  grafana_data:
    name: hft_grafana_data
  ml_models:
    name: hft_ml_models

services:
  # =================== L0: 基礎設施層 ===================
  
  redis:
    image: redis:7-alpine
    container_name: hft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hft_infrastructure
      - hft_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: hft-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./rust_hft/clickhouse/prd_market_data_tables.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hft_infrastructure
      - hft_internal
    environment:
      CLICKHOUSE_USER: hft_user
      CLICKHOUSE_PASSWORD: hft_secure_2025
      CLICKHOUSE_DB: hft_market_data
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: hft-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - hft_monitoring
      - hft_internal
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: hft-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hft_monitoring
      - hft_internal
    environment:
      GF_SECURITY_ADMIN_PASSWORD: hft_grafana_2025
      GF_USERS_ALLOW_SIGN_UP: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =================== L1: Rust HFT核心引擎 ===================
  
  rust-hft-core:
    build:
      context: ./rust_hft
      dockerfile: Dockerfile
    container_name: hft-rust-core
    restart: unless-stopped
    ports:
      - "50051:50051"  # gRPC服務
      - "8080:8080"    # HTTP指標端點
    networks:
      - hft_internal
      - hft_monitoring
    environment:
      RUST_LOG: info
      CLICKHOUSE_URL: "http://clickhouse:8123"
      REDIS_URL: "redis://redis:6379"
      PROMETHEUS_PORT: "8080"
      GRPC_PORT: "50051"
      HFT_ENV: "production"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grpcurl -plaintext localhost:50051 list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

  # =================== L2: 運維工作區 ===================
  
  ops-workspace:
    build:
      context: ./ops-workspace
      dockerfile: Dockerfile
    container_name: hft-ops-agent
    restart: unless-stopped
    ports:
      - "8503:8501"  # Streamlit UI
      - "8003:8000"  # FastAPI
    networks:
      - hft_internal
      - hft_monitoring
    environment:
      REDIS_URL: "redis://redis:6379"
      RUST_GRPC_URL: "rust-hft-core:50051"
      AGNO_ENV: "production"
      STREAMLIT_SERVER_PORT: "8501"
    volumes:
      - ./ops-workspace:/workspace
    depends_on:
      redis:
        condition: service_healthy
      rust-hft-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # =================== L3: 機器學習工作區 ===================
  
  ml-workspace:
    build:
      context: ./ml-workspace
      dockerfile: Dockerfile
    container_name: hft-ml-trainer
    restart: "no"  # 按需啟動，不自動重啟
    ports:
      - "8502:8501"  # Streamlit UI
      - "8002:8000"  # FastAPI
    networks:
      - hft_internal
    environment:
      CLICKHOUSE_URL: "http://clickhouse:8123"
      REDIS_URL: "redis://redis:6379"
      RUST_GRPC_URL: "rust-hft-core:50051"
      AGNO_ENV: "production"
      PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"
    volumes:
      - ./ml-workspace:/workspace
      - ml_models:/workspace/models
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  # =================== Master Orchestrator ===================
  
  master-orchestrator:
    build:
      context: ./hft-master-workspace
      dockerfile: Dockerfile
    container_name: hft-master-orchestrator
    restart: unless-stopped
    ports:
      - "8504:8501"  # Master控制台
      - "8004:8000"  # Master API
    networks:
      - hft_internal
      - hft_monitoring
    environment:
      REDIS_URL: "redis://redis:6379"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      PROMETHEUS_URL: "http://prometheus:9090"
      RUST_GRPC_URL: "rust-hft-core:50051"
      OPS_API_URL: "http://ops-workspace:8000"
      ML_API_URL: "http://ml-workspace:8000"
      AGNO_ENV: "production"
    volumes:
      - ./hft-master-workspace:/workspace
      - ./logs:/workspace/logs
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rust-hft-core:
        condition: service_healthy
      ops-workspace:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

# =================== 健康檢查和初始化 ===================
  
  system-initializer:
    image: curlimages/curl:latest
    container_name: hft-system-init
    networks:
      - hft_internal
    depends_on:
      master-orchestrator:
        condition: service_healthy
    command: |
      sh -c "
        echo '🚀 HFT系統初始化開始...'
        sleep 10
        echo '✅ 基礎設施就緒'
        echo '✅ Rust核心引擎就緒'
        echo '✅ 運維工作區就緒'
        echo '✅ Master Orchestrator就緒'
        echo '🎯 系統準備完成，可以開始交易！'
        echo '🌐 訪問控制台：http://localhost:8504'
        echo '📊 監控面板：http://localhost:3000'
        echo '⚡ Prometheus：http://localhost:9090'
      "
    restart: "no"