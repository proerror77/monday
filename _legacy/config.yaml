# 多交易對高頻交易配置文件

# API配置
api:
  api_key: "your_api_key_here"
  api_secret: "your_api_secret_here"
  passphrase: "your_passphrase_here"
  rate_limit: 5   # 每秒請求數限制 (降低以避免斷線)

# 交易對配置 (適用於400U資金規模)
trading_pairs:
  BTCUSDT:
    enabled: true
    order_size: 0.0001     # 每單交易量 (BTC) - 約10U
    spread: 0.0005         # 價差 (0.05%)
    min_depth: 50.0        # 最小深度 (USDT)
    max_orders: 1          # 最大同時訂單數
    order_amount: 10.0     # 每單金額 (USDT)
    
  ETHUSDT:
    enabled: false         # 暫時關閉，專注單一交易對
    order_size: 0.015      # 每單交易量 (ETH)
    spread: 0.001          # 價差 (0.1%)
    min_depth: 300.0       # 最小深度 (USDT)
    max_orders: 2          # 最大同時訂單數
    order_amount: 50.0     # 每單金額 (USDT)
    
  ADAUSDT:
    enabled: false         # 關閉
    order_size: 100.0      # 每單交易量 (ADA)
    spread: 0.002          # 價差 (0.2%)
    min_depth: 100.0       # 最小深度 (USDT)
    max_orders: 1          # 最大同時訂單數
    order_amount: 30.0     # 每單金額 (USDT)

# 風險管理配置 (400U資金規模)
risk_management:
  total_volume_limit: 50000.0     # 總交易量限制 (USDT)
  fee_offset: 40.0                # 手續費抵扣 (USDT)
  max_daily_trades: 200           # 每日最大交易次數
  total_capital: 400.0            # 總資金 (USDT)
  max_position_ratio: 0.05        # 最大單筆持倉比例 (5%)
  position_limits:                # 持倉限制
    BTCUSDT: 0.0002               # BTC最大持倉 (約20U)
    ETHUSDT: 0.05                 # ETH最大持倉
    ADAUSDT: 300.0                # ADA最大持倉

# WebSocket配置
websocket:
  max_connections: 5              # 最大連接數
  reconnect_delay: 5              # 重連延遲 (秒)
  ping_interval: 30               # 心跳間隔 (秒)
  max_reconnect_delay: 60         # 最大重連延遲 (秒)

# 性能配置
performance:
  order_interval: 0.5             # 最小下單間隔 (秒)
  cleanup_interval: 5             # 清理間隔 (秒) - 更頻繁清理
  order_timeout: 10               # 訂單超時時間 (秒) - 10秒超時
  depth_levels: 5                 # 使用5檔深度
  reorder_delay: 0.2              # 重新下單延遲 (秒)
  
# 日誌配置
logging:
  level: "INFO"                   # 日誌級別: DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file: "hft_bot_400u.log"        # 日誌文件
  max_size: "5MB"                 # 日誌文件最大大小
  backup_count: 3                 # 日誌文件備份數量

# 5檔訂單簿策略配置
orderbook_strategy:
  use_weighted_price: true        # 使用加權平均價格
  depth_weight_decay: 0.8         # 深度權重衰減係數
  min_spread_bps: 5               # 最小價差 (基點)
  max_spread_bps: 50              # 最大價差 (基點)
  aggressive_factor: 0.3          # 激進因子 (0-1, 越高越激進)