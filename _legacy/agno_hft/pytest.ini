[tool:pytest]
# Pytest 配置文件
minversion = 6.0
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# 測試發現
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 標記定義
markers =
    unit: 單元測試
    integration: 集成測試
    performance: 性能測試
    e2e: 端到端測試
    slow: 慢速測試（運行時間 > 5秒）
    
    # 功能模塊標記
    workflow: 工作流相關測試
    evaluator: 評估器相關測試
    agent: Agent 相關測試
    system: 系統集成相關測試
    
    # 外部依賴標記
    requires_rust: 需要 Rust 引擎的測試
    requires_db: 需要數據庫的測試
    requires_network: 需要網絡連接的測試

# 異步測試配置
asyncio_mode = auto

# 測試輸出配置
console_output_style = progress
junit_family = xunit2

# 警告過濾
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

# 超時配置
timeout = 300  # 5分鐘超時

# 覆蓋率配置（如果安裝了 pytest-cov）
# addopts = --cov=workflows --cov=ml --cov=system_integration --cov-report=html --cov-report=term