# Grafana Datasources - 精簡配置

apiVersion: 1

datasources:
  # Prometheus - 實時指標
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # ClickHouse - 唯一數據存儲
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: hft
    editable: false
