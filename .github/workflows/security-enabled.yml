name: Security & Quality (ENABLED)

on:
  schedule:
    # Weekly security audit
    - cron: '0 2 * * 1'
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # SAST - Static Application Security Testing
  # ============================================================================
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/rust
            p/security-audit
            p/owasp-top-ten
          generateSarif: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ============================================================================
  # Dependency Security Audit
  # ============================================================================
  cargo-audit:
    name: Dependency Security - Cargo Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust_hft
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_hft

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --json > audit-results.json
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(jq -r '.vulnerabilities[] | select(.advisory.severity=="critical") | .id' audit-results.json | wc -l)
          HIGH=$(jq -r '.vulnerabilities[] | select(.advisory.severity=="high") | .id' audit-results.json | wc -l)

          echo "Critical: $CRITICAL, High: $HIGH"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities!"
            jq -r '.vulnerabilities[] | select(.advisory.severity=="critical")' audit-results.json
            exit 1
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH high severity vulnerabilities"
            jq -r '.vulnerabilities[] | select(.advisory.severity=="high")' audit-results.json
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-results
          path: rust_hft/audit-results.json

  # ============================================================================
  # License Compliance
  # ============================================================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust_hft
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Check licenses
        run: |
          cargo license --json > licenses.json

          # Fail on incompatible licenses
          INCOMPATIBLE_LICENSES="GPL-2.0|GPL-3.0|AGPL-3.0|LGPL-3.0"

          if jq -r ".[] | .license" licenses.json | grep -E "$INCOMPATIBLE_LICENSES"; then
            echo "::error::Found incompatible licenses"
            exit 1
          fi

          echo "✅ All licenses compatible"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: rust_hft/licenses.json

  # ============================================================================
  # Code Quality - Strict Clippy
  # ============================================================================
  clippy-strict:
    name: Code Quality - Clippy (STRICT)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust_hft
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_hft

      - name: Run Clippy (strict)
        run: |
          cargo clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -W clippy::nursery \
            -A clippy::module_name_repetitions \
            -A clippy::similar_names \
            -A clippy::too_many_arguments

  # ============================================================================
  # Unused Dependencies
  # ============================================================================
  cargo-machete:
    name: Code Quality - Unused Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust_hft
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        run: cargo install cargo-machete

      - name: Check unused dependencies
        run: cargo machete

  # ============================================================================
  # Container Image Scanning
  # ============================================================================
  container-scan:
    name: Container Security - Image Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - name: ml-workspace
            dockerfile: deployment/docker/Dockerfile.ml_workspace
            context: .
          - name: hft-core
            dockerfile: rust_hft/docker/Dockerfile
            context: rust_hft
          - name: ops-workspace
            dockerfile: deployment/docker/Dockerfile.ops_workspace
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: hft-${{ matrix.name }}:scan

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hft-${{ matrix.name }}:scan
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('trivy-${{ matrix.name }}.sarif', 'utf8'));
            const vulnerabilities = report.runs[0].results || [];

            if (vulnerabilities.length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⚠️ Container scan found ${vulnerabilities.length} issues in ${{ matrix.name }}`
              });
            }

  # ============================================================================
  # Secrets Detection
  # ============================================================================
  secret-detection:
    name: Security - Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ============================================================================
  # SBOM Generation (Software Bill of Materials)
  # ============================================================================
  sbom:
    name: Security - SBOM Generation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # ============================================================================
  # Security Summary & Report
  # ============================================================================
  security-summary:
    name: Security Summary Report
    runs-on: ubuntu-latest
    needs:
      - sast-semgrep
      - cargo-audit
      - license-check
      - clippy-strict
      - container-scan
      - secret-detection
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "# 🔒 HFT System Security Report" > security-summary.md
          echo "" >> security-summary.md
          echo "**Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> security-summary.md
          echo "**Commit**: ${{ github.sha }}" >> security-summary.md
          echo "" >> security-summary.md

          echo "## Status Summary" >> security-summary.md
          echo "" >> security-summary.md

          if [ -f cargo-audit-results/audit-results.json ]; then
            CRITICAL=$(jq -r '.vulnerabilities[] | select(.advisory.severity=="critical") | .id' cargo-audit-results/audit-results.json 2>/dev/null | wc -l)
            HIGH=$(jq -r '.vulnerabilities[] | select(.advisory.severity=="high") | .id' cargo-audit-results/audit-results.json 2>/dev/null | wc -l)
            echo "- **Cargo Audit**: Critical=$CRITICAL, High=$HIGH" >> security-summary.md
          fi

          if [ -f license-report/licenses.json ]; then
            LICENSE_COUNT=$(jq length license-report/licenses.json)
            echo "- **License Check**: $LICENSE_COUNT dependencies" >> security-summary.md
          fi

          echo "" >> security-summary.md
          echo "## Artifacts" >> security-summary.md
          echo "- Audit results: cargo-audit-results/audit-results.json" >> security-summary.md
          echo "- License report: license-report/licenses.json" >> security-summary.md
          echo "- SBOM: sbom.json" >> security-summary.md

          cat security-summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md

      - name: Fail if critical findings
        if: failure()
        run: |
          echo "::error::Security checks failed - review artifacts"
          exit 1
