name: Python Heavy Deps (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  base-deps:
    name: Install core requirements (excluding TA-Lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml_workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core requirements (skip TA-Lib)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          grep -v -i '^TA-Lib' requirements.txt > requirements.nota.txt
          pip install -r requirements.nota.txt

      - name: Quick import checks
        run: |
          python - << 'PY'
          import numpy, pandas, sklearn, requests
          print('numpy', numpy.__version__)
          print('pandas', pandas.__version__)
          print('sklearn', sklearn.__version__)
          print('requests', requests.__version__)
          PY

  torch-cpu:
    name: Torch CPU wheels
    runs-on: ubuntu-latest
    needs: base-deps
    defaults:
      run:
        working-directory: ml_workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install torch CPU
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio

      - name: Verify torch import
        run: |
          python - << 'PY'
          import torch
          print('torch', torch.__version__, 'cuda?', torch.cuda.is_available())
          PY

