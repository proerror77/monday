name: Docker Smoke Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker_build:
    name: Build selected Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: deployment/docker/Dockerfile.ml_workspace
            context: .
          - dockerfile: rust_hft/docker/Dockerfile
            context: rust_hft
          - dockerfile: deployment/docker/Dockerfile.ops_workspace
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          provenance: false
          sbom: false
          build-args: |
            PYTHON_VERSION=3.11

