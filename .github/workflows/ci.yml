name: Monorepo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: monorepo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    defaults:
      run:
        working-directory: rust_hft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux build tools
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Record cache dimensions
        id: cache-info
        shell: bash
        run: |
          echo "rust=$(rustc -Vv | awk '/^release:/ {print $2}')" >> "$GITHUB_OUTPUT"
          echo "sccache=$(${SCCACHE_PATH:-sccache} --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust_hft
          key: rust_hft-ci-rust-${{ steps.cache-info.outputs.rust }}-sccache-${{ steps.cache-info.outputs.sccache }}-${{ hashFiles('rust_hft/Cargo.lock') }}
          cache-all-crates: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Format check (non-blocking)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy (non-blocking)
        run: |
          cargo clippy --workspace --all-targets \
            -W clippy::correctness \
            -W clippy::perf \
            -W clippy::suspicious
        continue-on-error: true

      - name: Build
        run: cargo build --workspace --locked

      - name: Package binaries (if present)
        if: github.event_name == 'push'
        run: |
          mkdir -p dist
          for bin in hft-live hft-paper hft-all-in-one hft-replay; do
            if [ -f target/debug/$bin ]; then
              cp target/debug/$bin dist/
            fi
          done
          ls -la dist || true

      - name: Upload artifacts
        if: success() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: rust-dev-binaries-${{ github.sha }}
          path: rust_hft/dist/*
          if-no-files-found: ignore

  rust_hft_engine_fast_lane:
    name: Rust HFT Engine Fast Lane
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    defaults:
      run:
        working-directory: rust_hft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux build tools
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Record cache dimensions
        id: cache-info
        shell: bash
        run: |
          echo "rust=$(rustc -Vv | awk '/^release:/ {print $2}')" >> "$GITHUB_OUTPUT"
          echo "sccache=$(${SCCACHE_PATH:-sccache} --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust_hft
          key: hft-engine-fast-lane-${{ steps.cache-info.outputs.rust }}-sccache-${{ steps.cache-info.outputs.sccache }}-${{ hashFiles('rust_hft/Cargo.lock') }}
          cache-all-crates: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Format hft-engine
        run: cargo fmt --check --package hft-engine

      - name: Check hft-engine
        run: cargo check -p hft-engine --locked

      - name: Test Binance MD fast lane
        run: cargo test -p hft-engine --locked binance_md

  rust_extra_standalone:
    name: Rust Standalone (test_bitget_standalone)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    defaults:
      run:
        working-directory: test_bitget_standalone
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Record cache dimensions
        id: cache-info
        shell: bash
        run: |
          echo "rust=$(rustc -Vv | awk '/^release:/ {print $2}')" >> "$GITHUB_OUTPUT"
          echo "sccache=$(${SCCACHE_PATH:-sccache} --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Rust (standalone)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            test_bitget_standalone
          key: bitget-standalone-rust-${{ steps.cache-info.outputs.rust }}-sccache-${{ steps.cache-info.outputs.sccache }}-${{ hashFiles('test_bitget_standalone/Cargo.lock', 'test_bitget_standalone/Cargo.toml') }}
          cache-all-crates: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Build (release)
        run: cargo build --release

      - name: Package standalone binaries (if present)
        run: |
          mkdir -p dist
          for bin in test_bitget_standalone test_bitget_connection; do
            if [ -f target/release/$bin ]; then
              cp target/release/$bin dist/
            fi
          done
          ls -la dist || true

      - name: Upload standalone artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rust-standalone-binaries-${{ github.sha }}
          path: test_bitget_standalone/dist/*
          if-no-files-found: ignore

  python_lint:
    name: Python Lint (ml_workspace)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml_workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff
        run: ruff check .
        continue-on-error: true

      - name: Black
        run: black --check --diff .
        continue-on-error: true

      - name: Syntax check
        run: python -m compileall .

  node_install:
    name: Node Install (root)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node lockfile
        id: node-lock
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "cache=npm" >> "$GITHUB_OUTPUT"
          elif [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "cache=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "cache=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=none" >> "$GITHUB_OUTPUT"
            echo "cache=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.node-lock.outputs.manager != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ steps.node-lock.outputs.cache }}

      - name: Install dependencies
        if: steps.node-lock.outputs.manager != 'none'
        run: |
          case "${{ steps.node-lock.outputs.manager }}" in
            npm)
              npm ci --prefer-offline --no-audit --fund=false
              ;;
            pnpm)
              corepack enable
              pnpm install --frozen-lockfile
              ;;
            yarn)
              corepack enable
              yarn install --immutable || yarn install --frozen-lockfile
              ;;
          esac

      - name: Skip Node install
        if: steps.node-lock.outputs.manager == 'none'
        run: echo "No root Node lockfile found; skipping Node install."
