# Simplified HFT System CI/CD Pipeline
# Focuses on what actually exists in the repository

name: HFT System CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ==================================
  # Rust Core Test & Build
  # ==================================
  rust_test_build:
    name: Rust HFT Core
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust_hft

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_hft/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust Format Check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run Rust Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Build Rust Release
        run: cargo build --release --workspace
        continue-on-error: true

  # ==================================
  # Python ML Workspace
  # ==================================
  python_ml_workspace:
    name: Python ML Workspace
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml_workspace

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Python Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ml_workspace/requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        continue-on-error: true

      - name: Run Black Format Check
        run: |
          pip install black
          black --check --diff . || true
        continue-on-error: true

      - name: Run Ruff Linting
        run: |
          pip install ruff
          ruff check . || true
        continue-on-error: true

  # ==================================
  # Summary
  # ==================================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [rust_test_build, python_ml_workspace]
    if: always()

    steps:
      - name: Pipeline Status
        run: |
          echo "🎯 CI/CD Pipeline 完成"
          printf '%0.s=' {1..50}
          echo ""
          echo "✅ Rust Build: ${{ needs.rust_test_build.result }}"
          echo "✅ Python ML: ${{ needs.python_ml_workspace.result }}"
          echo ""
          echo "🏆 HFT System CI/CD 执行完成"
