# ML Workspace Configuration for L3 ML-Agent
# 負責模型訓練、特徵工程、批次處理
[project]
name = "hft-ml-workspace"
version = "1.0.0"
description = "HFT ML Agent - 模型訓練與特徵工程專用Workspace"
authors = ["HFT Team"]

[workspace]
type = "ml_training"
lifecycle = "batch"  # 批次任務，非常駐服務
schedule = "0 2 * * *"  # 每日凌晨2點執行

[agents]
[agents.ml_trainer]
name = "HFTMLTrainer"
description = "TLOB Transformer模型訓練專家"
model = "claude-sonnet-4-20250514"
max_context = 200000
tools = ["rust_hft_tools", "data_processing", "model_training"]

[agents.feature_engineer]
name = "FeatureEngineer"  
description = "市場數據特徵工程專家"
model = "qwen2.5:3b"
tools = ["rust_hft_tools", "clickhouse_client", "feature_extraction"]

[workflows]
[workflows.training_pipeline]
name = "TLOB模型訓練流水線"
description = "完整的模型訓練工作流程"
entry_point = "workflows.training_workflow:TLOBTrainingWorkflow"
timeout = 7200  # 2小時超時
retries = 2

[workflows.feature_engineering]
name = "特徵工程流水線"
description = "市場數據特徵提取與預處理"
entry_point = "workflows.feature_workflow:FeatureEngineeringWorkflow"
timeout = 1800  # 30分鐘超時

[resources]
gpu_required = true
gpu_memory = "8GB"
cpu_cores = 8
memory = "16GB"
storage = "100GB"

[dependencies]
torch = ">=2.0.0"
transformers = ">=4.30.0"
clickhouse-driver = ">=0.2.0"
redis = ">=4.5.0"
numpy = ">=1.24.0"
pandas = ">=2.0.0"

[environment]
CUDA_VISIBLE_DEVICES = "0"
TORCH_HOME = "/tmp/torch_cache"
HF_HOME = "/tmp/huggingface_cache"

[monitoring]
metrics_enabled = true
logging_level = "INFO"
performance_tracking = true

[data]
input_sources = ["clickhouse", "redis_cache"]
output_destinations = ["model_registry", "s3_bucket"]
data_retention_days = 30

[security]
enable_model_signing = true
require_validation = true
audit_training_data = true
