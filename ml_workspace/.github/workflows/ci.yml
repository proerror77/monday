name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Code Quality (Black + Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black ruff

      - name: Check formatting with Black
        run: black --check --line-length 100 .

      - name: Lint with Ruff
        run: ruff check .

  test:
    name: Tests (Unit + Integration)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          # Mock ClickHouse connection for CI
          CLICKHOUSE_HOST: http://localhost:8123
          CLICKHOUSE_USERNAME: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DATABASE: default
        run: |
          PYTHONPATH=. pytest tests/ -v --cov=utils --cov=components --cov=lob_core --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  feature-verify:
    name: Feature Contract Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify feature registry contracts
        env:
          CLICKHOUSE_HOST: http://localhost:8123
          CLICKHOUSE_USERNAME: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DATABASE: default
        run: |
          # This would normally run: python cli.py features verify
          # For now just ensure the command exists
          python cli.py --help | grep "features"
