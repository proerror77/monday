[package]
name = "standalone_benchmark"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "benchmark"
path = "standalone_architecture_benchmark.rs"

[dependencies]
arc-swap = "1.0"
dashmap = "6.0"
serde_json = "1.0"
simd-json = "0.15.1"
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
opt-level = 3
overflow-checks = false
debug = false