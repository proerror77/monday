# Ops Workspace Configuration for L2 Ops-Agent  
# 負責7x24小時實時監控、告警、風險控制
[project]
name = "hft-ops-workspace"
version = "1.0.0"
description = "HFT Ops Agent - 實時監控與風險控制專用Workspace"
authors = ["HFT Team"]

[workspace]
type = "realtime_monitoring"
lifecycle = "daemon"  # 常駐服務
uptime_requirement = "99.99%"

[agents]
[agents.latency_guard]
name = "LatencyGuard"
description = "交易延遲監控與告警Agent - PRD第3.2.1節"
model = "qwen2.5:3b"
response_time_ms = 100  # 快速響應要求
tools = ["rust_monitoring", "redis_pubsub", "alert_system"]

[agents.dd_guard]  
name = "DrawdownGuard"
description = "最大回撤風險控制Agent - PRD第3.2.2節"
model = "qwen2.5:3b"
response_time_ms = 50   # 超快速響應
tools = ["rust_monitoring", "risk_calculator", "emergency_stop"]

[agents.system_monitor]
name = "SystemMonitor"
description = "系統健康監控Agent"
model = "qwen2.5:3b"
tools = ["system_metrics", "rust_hft_status", "performance_tracker"]

[workflows]
[workflows.alert_pipeline]
name = "實時告警處理流水線"
description = "Redis告警事件的實時處理工作流程"
entry_point = "workflows.alert_workflow:AlertHandlingWorkflow"
timeout = 30   # 30秒內必須響應
retries = 0    # 告警不重試，避免延遲

[workflows.risk_control]
name = "風險控制流水線"
description = "實時風險監控和緊急停止"
entry_point = "workflows.risk_workflow:RiskControlWorkflow"
timeout = 10   # 10秒內完成風險評估
retries = 0

[resources]
gpu_required = false  # 監控不需要GPU
cpu_cores = 2         # 輕量級資源需求
memory = "2GB"
network_priority = "high"  # 需要高網路優先級

[dependencies]
redis = ">=4.5.0"
grpcio = ">=1.50.0"
prometheus-client = ">=0.16.0"
asyncio = ">=3.4.0"

[environment]
REDIS_URL = "redis://localhost:6379"  
GRPC_PORT = "50051"
PROMETHEUS_PORT = "8000"
LOG_LEVEL = "INFO"

[monitoring]
self_monitoring = true
health_check_interval = 5  # 5秒自檢
memory_limit_mb = 500      # 記憶體使用限制
cpu_limit_percent = 50

[redis_channels]
# PRD第4節定義的Redis Channel契約
subscriptions = [
    "ml.deploy",     # 模型部署通知
    "ml.reject",     # 模型拒絕通知  
    "ops.alert",     # 運營告警
    "kill-switch"    # 緊急停止
]

[alerts]
[alerts.latency_threshold]
metric = "execution_latency_us"
threshold = 25.0  # 25微秒閾值 - PRD第3.2.1節
severity = "HIGH"
action = "switch_conservative_mode"

[alerts.drawdown_threshold]
metric = "max_drawdown_percent"
threshold = 5.0   # 5%最大回撤 - PRD第3.2.2節  
severity = "CRITICAL"
action = "emergency_stop"

[alerts.system_health]
metric = "rust_engine_status"
threshold = "unhealthy"
severity = "CRITICAL" 
action = "restart_engine"

[security]
enable_encryption = true
require_authentication = true
rate_limiting = true