[package]
name = "hft-data-adapter-grvt"
version = "0.1.0"
edition = "2021"

[dependencies]
hft-core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
integration = { package = "hft-integration", path = "../../../market-core/integration" }
adapters-common = { package = "hft-data-adapters-common", path = "../../adapters-common" }
async-trait = "0.1"
tokio = { workspace = true, features = ["sync", "rt", "macros", "time"] }
tracing = { workspace = true }
futures = { workspace = true }
async-stream = "0.3"
serde = { workspace = true }
serde_json = { workspace = true }
tokio-tungstenite = { workspace = true }
simd-json = { workspace = true, optional = true }
url = "2.5"
tokio-stream = { version = "0.1", features = ["sync"] }

[features]
default = []
json-simd = ["dep:simd-json"]

[lib]
name = "adapter_grvt_data"
