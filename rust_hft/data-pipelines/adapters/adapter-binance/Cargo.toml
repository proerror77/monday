[package]
name = "hft-data-adapter-binance"
version = "0.1.0"
edition = "2021"
description = "Binance 公有行情 adapter (實作 MarketStream)"

[dependencies]
# Core dependencies
hft-core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
integration = { package = "hft-integration", path = "../../../market-core/integration", default-features = false }
adapters-common = { package = "hft-data-adapters-common", path = "../../adapters-common" }

# Async and networking
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
bytes = "1.5"

# Serialization
serde = { workspace = true }
serde_json = "1.0"
simd-json = { workspace = true, optional = true }

# Utilities
tracing = { workspace = true }
url = "2.4"
chrono = { workspace = true }
rust_decimal = { workspace = true }
async-trait = "0.1"

[features]
default = []
json-simd = ["dep:simd-json", "integration/json-simd"]

[lib]
name = "data_adapter_binance"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "json_parsing"
harness = false
