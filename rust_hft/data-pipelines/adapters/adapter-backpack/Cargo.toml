[package]
name = "hft-data-adapter-backpack"
version = "0.1.0"
edition = "2021"
description = "Backpack Exchange market data adapter"

[dependencies]
hft-core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
adapters_common = { package = "hft-data-adapters-common", path = "../../adapters-common" }

async-trait = "0.1"
async-stream = "0.3"
futures = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { version = "1.0" }
tokio = { workspace = true, features = ["full"] }
tokio-tungstenite = { workspace = true }
simd-json = { workspace = true, optional = true }

[features]
default = []
json-simd = ["dep:simd-json"]

[lib]
name = "adapter_backpack_data"
