[package]
name = "hft-data-adapter-bybit"
version = "0.1.0"
edition = "2021"

[lib]
name = "adapter_bybit_data"

[dependencies]
# Core dependencies
hft-core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
integration = { package = "hft-integration", path = "../../../market-core/integration" }
adapters-common = { package = "hft-data-adapters-common", path = "../../adapters-common" }

# Async and networking
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
async-stream = "0.3"

# Serialization
serde = { workspace = true }
serde_json = "1.0"
simd-json = { workspace = true, optional = true }

# Utilities
tracing = { workspace = true }
url = "2.4"
chrono = { workspace = true }
rust_decimal = { workspace = true }
async-trait = "0.1"

[features]
default = []
json-simd = ["dep:simd-json"]
