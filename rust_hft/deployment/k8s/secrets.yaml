# Secrets Template for HFT System
# 敏感數據 - 需要加密存儲
# 注意: 這是模板文件，實際部署時需要替換值

# ============================================
# 方式 1: 直接使用 Kubernetes Secrets (開發環境)
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: hft-secrets
  namespace: hft-trading
type: Opaque
stringData:
  # Redis 連接
  redis-url: "redis://redis:6379"

  # ClickHouse 連接
  clickhouse-url: "http://clickhouse:8123"
  clickhouse-user: "default"
  clickhouse-password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: exchange-secrets
  namespace: hft-trading
type: Opaque
stringData:
  # Bitget API
  bitget-api-key: "${BITGET_API_KEY}"
  bitget-api-secret: "${BITGET_API_SECRET}"
  bitget-passphrase: "${BITGET_PASSPHRASE}"

  # Binance API
  binance-api-key: "${BINANCE_API_KEY}"
  binance-api-secret: "${BINANCE_API_SECRET}"

  # Bybit API
  bybit-api-key: "${BYBIT_API_KEY}"
  bybit-api-secret: "${BYBIT_API_SECRET}"

  # Hyperliquid API
  hyperliquid-private-key: "${HYPERLIQUID_PRIVATE_KEY}"

---
apiVersion: v1
kind: Secret
metadata:
  name: alert-secrets
  namespace: hft-trading
type: Opaque
stringData:
  # Slack/Discord Webhook
  webhook-url: "${ALERT_WEBHOOK_URL}"

  # PagerDuty
  pagerduty-key: "${PAGERDUTY_KEY}"

---
