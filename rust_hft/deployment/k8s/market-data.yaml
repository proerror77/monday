# Service for all market data pods
apiVersion: v1
kind: Service
metadata:
  name: market-data
  namespace: hft-trading
  labels:
    app: market-data
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9093
    targetPort: metrics
  selector:
