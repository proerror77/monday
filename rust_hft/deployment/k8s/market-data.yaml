# Market Data Service Deployment
# 市場數據接入 - 按交易所拆分，支持水平擴展

apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-bitget
  namespace: hft-trading
  labels:
    app: market-data
    exchange: bitget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data
      exchange: bitget
  template:
    metadata:
      labels:
        app: market-data
        exchange: bitget
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      nodeSelector:
        node-type: low-latency

      containers:
      - name: market-data
        image: ${ECR_REGISTRY}/hft-market-data:${IMAGE_TAG}
        imagePullPolicy: Always

        env:
        - name: RUST_LOG
          value: "info"
        - name: EXCHANGE
          value: "bitget"
        - name: SYMBOLS
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: bitget-symbols
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: hft-secrets
              key: redis-url

        ports:
        - name: metrics
          containerPort: 9093

        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi

        livenessProbe:
          httpGet:
            path: /health
            port: 9093
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 5

