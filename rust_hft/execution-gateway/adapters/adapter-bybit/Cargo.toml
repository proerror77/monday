[package]
name = "hft-execution-adapter-bybit"
version = "0.1.0"
edition = "2021"

[lib]
name = "adapter_bybit_execution"

[dependencies]
# Core dependencies
hft_core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
integration = { package = "hft-integration", path = "../../../market-core/integration" }
execution = { package = "hft-execution", path = "../../execution" }

# Async and networking
tokio = { workspace = true, features = ["full"] }
tokio-tungstenite = { version = "0.21", features = ["rustls-tls-webpki-roots"] }
tokio-stream = { version = "0.1", features = ["sync"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = "1.0"

# Utilities
tracing = { workspace = true }
url = "2.4"
chrono = { workspace = true }
rust_decimal = { workspace = true }
uuid = "1.0"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
async-trait = "0.1"
