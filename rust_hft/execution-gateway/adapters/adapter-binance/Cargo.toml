[package]
name = "hft-execution-adapter-binance"
version = "0.1.0"
edition = "2021"
description = "Binance 私有WS/REST adapter (實作 ExecutionClient)"

[dependencies]
hft-core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
integration = { package = "hft-integration", path = "../../../market-core/integration" }
execution = { package = "hft-execution", path = "../../execution" }
serde = { workspace = true }
tracing = { workspace = true }
futures = { workspace = true }
async-trait = "0.1"
tokio = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-tungstenite = { version = "0.21", features = ["rustls-tls-webpki-roots"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
serde_json = "1.0"

[features]
default = []
live = []
paper = []

[lib]
name = "execution_adapter_binance"
