[package]
name = "hft-execution-adapter-okx"
version = "0.1.0"
edition = "2021"

[lib]
name = "adapter_okx_execution"

[dependencies]
hft_core = { package = "hft-core", path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
integration = { package = "hft-integration", path = "../../../market-core/integration" }
async-trait = "0.1"
futures = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-tungstenite = { version = "0.21", features = ["rustls-tls-webpki-roots"] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { workspace = true }
serde_json = "1.0"
tracing = { workspace = true }
rust_decimal = { workspace = true }
chrono = { workspace = true }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
