# Cargo 配置文件 - 測試和構建優化

[alias]
# 測試相關命令別名
test-all = "test --all-targets --all-features"
test-cov = "llvm-cov --all-features --workspace --lcov --output-path lcov.info"
test-fast = "test --lib --bins"
bench-all = "bench --all-targets"

# 開發相關命令
check-all = "check --all-targets --all-features"
clippy-all = "clippy --all-targets --all-features -- -D warnings"
fmt-check = "fmt --all -- --check"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[build]
# 默認啟用所有CPU特性以獲得最佳性能
rustflags = ["-C", "target-cpu=native"]

[profile.test]
# 測試配置優化
opt-level = 1        # 基本優化，加快測試運行
debug = true         # 保留調試信息
lto = "thin"         # 輕量鏈接時優化
incremental = true   # 啟用增量編譯

[profile.bench]
# 基準測試配置
opt-level = 3        # 最高優化
debug = false        # 不包含調試信息
lto = "fat"          # 完整鏈接時優化
codegen-units = 1    # 單個代碼生成單元
panic = "abort"      # 遇到panic直接終止

[env]
# 測試環境變量
RUST_LOG = "debug"
RUST_BACKTRACE = "1"