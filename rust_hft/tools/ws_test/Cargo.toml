[package]
name = "ws-connection-test"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ws-test"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
