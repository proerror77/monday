[package]
name = "hft-dataset"
version = "0.1.0"
edition = "2021"
description = "Dataset tooling: grid (fixed-step LOB) and export (normalized windows with labels)"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
clickhouse = "0.12"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
ordered-float = "4"
chrono = { version = "0.4", features = ["serde"] }

[[bin]]
name = "hft-dataset"
path = "src/main.rs"
