version: '3.8'

services:
  binance-spot:
    image: hft-collector:standard
    container_name: hft-binance-spot
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: 'default'
      CLICKHOUSE_PASSWORD: 's9wECb~NGZPOE'
      RUST_LOG: 'info'
      SYMBOLS_FILE: '/app/config/symbol_whitelist.json'
    command: >
      multi
      --exchange binance
      --top-limit 20
      --depth-mode both
      --depth-levels 20
      --flush-ms 2000
      --lob-mode snapshot
      --store-raw
      --symbols-file /app/config/symbol_whitelist.json
      --ch-url https://kcveg5xfsi.ap-northeast-1.aws.clickhouse.cloud:8443
      --database hft_db

