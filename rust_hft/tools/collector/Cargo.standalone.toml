[package]
name = "hft-collector"
version = "0.1.0"
edition = "2021"
description = "独立的HFT数据收集器"

# 最小化依赖，不依赖整个rust_hft workspace
[dependencies]
# 核心异步运行时
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync", "net"] }

# WebSocket - 使用rustls避免OpenSSL
tokio-tungstenite = { version = "0.20", default-features = false, features = ["rustls-tls-webpki-roots"] }

# HTTP客户端
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }

# ClickHouse
clickhouse = { version = "0.12", default-features = false, features = ["rustls-tls"] }

# 基础依赖
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1", features = ["serde"] }
anyhow = "1"
async-trait = "0.1"
urlencoding = "2"

# 监控（可选）
prometheus = { version = "0.13", optional = true }
hyper = { version = "0.14", features = ["server"], optional = true }

[features]
default = ["binance", "binance-futures", "bitget"]

# 交易所features（细粒度控制）
binance = []
binance-futures = []
bitget = []
bybit = []

# 监控（可选）
metrics = ["prometheus", "hyper"]

# 优化编译
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[[bin]]
name = "hft-collector"
path = "src/main.rs"