# HFT Historical Data Download Configuration
# 使用 Bitget 公開歷史數據，無需 API key
# 數據源: https://img.bitgetimg.com/online/depth/{symbol}/1/{date}.zip

# 默認配置
default:
  symbol: "BTCUSDT"
  data_type: "depth"
  date_range:
    start_date: "2024-07-01"
    end_date: "2024-07-02"
  output:
    directory: "./historical_data"
    cleanup_zip: true
    skip_existing: true
  performance:
    max_concurrent: 3
    batch_size: 1000
    max_retries: 3
  clickhouse:
    enabled: false
    url: "http://localhost:8123"
    database: "hft_db"
    username: "default"
    password: ""

