[package]
name = "hft-execution-adapter-bitget"
version = "0.1.0"
edition = "2021"
description = "Bitget 私有WS/REST adapter (實作 ExecutionClient)"

[dependencies]
hft-core = { package = "hft-core", path = "../../../core" }
ports = { package = "hft-ports", path = "../../../ports" }
integration = { package = "hft-integration", path = "../../../integration" }
serde = { workspace = true }
tracing = { workspace = true }
futures = { workspace = true }
async-trait = "0.1"
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
serde_json = "1.0"
tokio-tungstenite = { workspace = true, features = ["connect", "stream"] }
futures-util = "0.3"
url = "2.4"
tokio-stream = { version = "0.1", features = ["sync"] }
rust_decimal = { workspace = true }

[features]
default = []
live = []
paper = []
metrics = []

[dev-dependencies]
tracing-subscriber = "0.3"

[lib]
name = "execution_adapter_bitget"
