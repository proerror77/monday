[package]
name = "hft-data-adapter-binance"
version = "0.1.0"
edition = "2021"
description = "Binance 公有行情 adapter (實作 MarketStream)"

[dependencies]
# Core dependencies
hft-core = { package = "hft-core", path = "../../../core" }
ports = { package = "hft-ports", path = "../../../ports" }
integration = { package = "hft-integration", path = "../../../integration" }

# Async and networking
tokio = { workspace = true, features = ["full"] }
tokio-tungstenite = { version = "0.21", features = ["rustls-tls-webpki-roots"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { version = "1.0", optional = true }

# Utilities
tracing = { workspace = true }
url = "2.4"
chrono = { workspace = true }
rust_decimal = { workspace = true }
async-trait = "0.1"

# Optional optimizations
simd-json = { version = "0.13", optional = true }

[features]
default = ["json-std"]
json-std = ["serde_json"]
json-simd = ["simd-json"]

[lib]
name = "data_adapter_binance"
