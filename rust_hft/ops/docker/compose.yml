version: "3.9"

services:
  hft-collector-binance:
    image: ${IMAGE:-hft-collector:local}
    container_name: hft-collector-binance
    restart: always
    env_file:
      - /etc/hft-collector.env
    environment:
      EXCHANGE: binance
    ulimits:
      nofile: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hft-collector-binance-futures:
    image: ${IMAGE:-hft-collector:local}
    container_name: hft-collector-binance-futures
