services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: hft_clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native client
      - "9363:9363"  # Prometheus /metrics (built-in)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config:/etc/clickhouse-server/config.d:ro
    environment:
      - CLICKHOUSE_DB=hft
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: hft_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:10.0.0
    container_name: hft_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=2s
    depends_on:
      - prometheus
      - clickhouse
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse built-in Prometheus endpoint is exposed on port 9363

  # hft-live application inside compose for internal scraping
  hft_app:
    build:
      context: ..
      dockerfile: ops/hft-live.Dockerfile
    container_name: hft_app
    profiles: ["app"]
    environment:
      - RUST_LOG=info
      # Pass API keys if needed (uncomment and set in your env before `docker compose up`)
      # - BITGET_API_KEY=${BITGET_API_KEY}
      # - BITGET_SECRET=${BITGET_SECRET}
      # - BITGET_PASSPHRASE=${BITGET_PASSPHRASE}
      # - BINANCE_API_KEY=${BINANCE_API_KEY}
      # - BINANCE_SECRET=${BINANCE_SECRET}
    volumes:
      - ../config/dev/system_imbalance.yaml:/app/config/system.yaml:ro
    command: ["/usr/local/bin/hft-live", "--config", "/app/config/system.yaml"]
    depends_on:
      - clickhouse
    # Only needed for internal Prometheus scraping; no host port mapping by default

volumes:
  clickhouse_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: hft_network
