[package]
name = "hft-portfolio-core"
version = "0.1.0"
edition = "2021"
description = "以 fill/fee/funding 為唯一真相源，導出 AccountView 快照"

[dependencies]
serde = { workspace = true, features = ["derive"] }
hft-core = { package = "hft-core", path = "../../market-core/core" }
ports = { package = "hft-ports", path = "../../market-core/ports" }
snapshot = { package = "hft-snapshot", path = "../../market-core/snapshot" }
rust_decimal = { version = "1.33", features = ["serde"] }
tracing = { workspace = true }

[features]
default = []

[lib]
name = "portfolio_core"
