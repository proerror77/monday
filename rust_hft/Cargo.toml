path = "examples/01_data_collection/clickhouse_writer.rs"

[[example]]
name = "multi_symbol_collector"
path = "examples/01_data_collection/multi_symbol_collector.rs"

[[example]]
name = "data_quality_monitor"
path = "examples/01_data_collection/data_quality_monitor.rs"

# 📈 層級 2: LOB 處理層
[[example]]
name = "historical_backtest"
path = "examples/02_lob_processing/historical_backtest.rs"

# 🧠 層級 3: 模型推理層
[[example]]
name = "inference_benchmark"
path = "examples/03_model_inference/inference_benchmark.rs"

[[example]]
name = "strategy_executor"
path = "examples/03_model_inference/strategy_executor.rs"

# 🔧 層級 5: 系統整合層
[[example]]
name = "end_to_end_test"
path = "examples/05_system_integration/end_to_end_test.rs"

[[example]]
name = "latency_benchmark"
path = "examples/05_system_integration/latency_benchmark.rs"

[[example]]
name = "system_monitoring"
path = "examples/05_system_integration/system_monitoring.rs"

[[example]]
name = "stress_test"
path = "examples/05_system_integration/stress_test.rs"

# 🧪 真實WebSocket連接測試
[[example]]
name = "test_real_ws_connection"
path = "examples/test_real_ws_connection.rs"

# 💾 完整數據庫壓力測試
[[example]]
name = "comprehensive_db_stress_test"
path = "examples/comprehensive_db_stress_test.rs"

[[bench]]
name = "orderbook_benchmarks"
harness = false

[[bench]]
name = "ultra_high_perf_benchmarks"
harness = false

[workspace]
members = [
    ".",           # 根項目
]
resolver = "2"

# Workspace-wide dependencies for consistency
[workspace.dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
anyhow = "1.0"
dashmap = "6.0"
ordered-float = { version = "5.0.0", features = ["serde"] }
rust_decimal = { version = "1.32", features = ["std", "serde"] }
criterion = { version = "0.5", features = ["html_reports"] }
