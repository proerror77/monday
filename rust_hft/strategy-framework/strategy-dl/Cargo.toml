[package]
name = "hft-strategy-dl"
version = "0.1.0"
edition = "2021"
description = "深度學習策略：TorchScript 模型集成與推理"

[dependencies]
hft-core = { package = "hft-core", path = "../../market-core/core" }
ports = { package = "hft-ports", path = "../../market-core/ports" }
serde = { workspace = true }
tracing = "0.1"
tokio = { version = "1.0", features = ["sync", "time"] }

# PyTorch 集成
tch = { version = "0.16", optional = true }

# 特徵處理
ndarray = "0.16"
rust_decimal = { workspace = true }

# 配置與序列化  
serde_yaml = "0.9"

[features]
default = []
# TorchScript 模型支持
torchscript = ["dep:tch"]
# CPU 推理模式
cpu-inference = []
# GPU 推理模式 (需要 CUDA)
gpu-inference = []

[lib]
name = "strategy_dl"
