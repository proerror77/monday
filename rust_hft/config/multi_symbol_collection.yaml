# 多商品高性能數據收集配置
# Multi-Symbol High Performance Data Collection Configuration

# 交易對配置 - 減少符號數量以提高穩定性
symbols:
  - "BTCUSDT"    # Bitcoin - 主要
  - "ETHUSDT"    # Ethereum - 主要
  - "SOLUSDT"    # Solana - 高流量
  - "XRPUSDT"    # Ripple - 中等流量
  - "DOGEUSDT"   # Dogecoin - 中等流量
  - "ADAUSDT"    # Cardano - 低流量

# 數據收集配置
data_collection:
  # 收集類型
  channels:
    - "Books5"     # 5檔深度
    - "Books15"    # 15檔深度  
    - "Trade"      # 成交數據
    - "Ticker"     # 價格摘要

  # 高性能設置 - 降低內存使用
  performance:
    batch_size: 1000              # 批量處理大小（降低）
    buffer_capacity: 5000         # 緩衝區容量（降低）
    flush_interval_ms: 200        # 刷新間隔(毫秒)（增加以減少頻率）
    enable_simd: true             # 啟用SIMD優化
    cpu_affinity: true            # CPU親和性
    memory_prefault_mb: 256       # 內存預分配（降低）
    
  # 數據質量
  quality_control:
    enable_validation: true       # 啟用數據驗證
    max_latency_ms: 50           # 最大延遲閾值
    duplicate_detection: true     # 重複檢測
    sequence_validation: true     # 序列驗證

# 連接配置 - 優化防止頻繁斷線
connection:
  # 重連策略: "fast", "standard", "conservative", "custom"
  reconnect_strategy: "conservative"  # 使用保守策略，減少對服務器壓力
  auto_reconnect: true               # 自動重連開關
  max_reconnect_attempts: 999        # 幾乎無限重連（實際會無限重連）
  timeout_seconds: 45                # 連接超時時間（增加到45秒，給服務器更多響應時間）
  
  # 連接優化設置
  connection_limits:
    max_subscriptions_per_connection: 16  # 每個連接最大訂閱數（降低負載）
    subscription_batch_delay_ms: 100      # 批量訂閱間延遲（避免速率限制）
    keepalive_interval_sec: 25            # 心跳間隔（保持連接活躍）
    message_timeout_sec: 90               # 消息超時（降低敏感度）
  
  # 自定義重連參數（當策略為"custom"時使用）
  custom_reconnect:
    initial_delay_ms: 500        # 初始延遲增加
    max_delay_ms: 10000         # 最大延遲增加
    multiplier: 1.5             # 延遲倍數降低（更溫和的退避）

# ClickHouse配置
clickhouse:
  enabled: true
  connection:
    url: "http://localhost:8123"
    database: "hft_db"
    username: "hft_user"
    password: "hft_password"
    
  # 寫入優化
  batch_settings:
    batch_size: 1000            # 數據庫批量大小
    flush_interval_ms: 5000     # 數據庫刷新間隔
    max_memory_mb: 100          # 最大內存使用
    compression: "lz4"          # 壓縮算法
    
  # 表配置
  tables:
    market_data: "enhanced_market_data"
    trade_data: "trade_executions"
    quality_metrics: "data_quality_metrics"

# 監控配置
monitoring:
  enable_realtime_stats: true
  stats_interval_sec: 30
  enable_performance_metrics: true
  log_level: "info"
  
  # 警報閾值
  alerts:
    max_processing_latency_us: 1000
    min_throughput_msg_per_sec: 500
    max_error_rate_percent: 1.0

# 文件輸出（可選）
file_output:
  enabled: false
  format: "jsonl"
  directory: "./market_data"
  rotation_size_mb: 100
  compression: true