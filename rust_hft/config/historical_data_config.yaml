# HFT 歷史資料配置文件
# 使用方法：
# cargo run --example download_historical_lob -- --config config/historical_data_config.yaml --profile production

# 預設配置
default:
  # 基本參數
  symbol: "SOLUSDT"
  data_type: "depth"  # depth, trade, all
  
  # 日期範圍
  date_range:
    start_date: "2024-07-01"
    end_date: "2024-07-03"
    # 或使用相對日期
    # days_back: 7  # 從今天往前推 7 天
  
  # 輸出設置
  output:
    directory: "./historical_data"
    cleanup_zip: true
    skip_existing: true
  
  # 性能設置
  performance:
    max_concurrent: 5
    batch_size: 5000
    max_retries: 3
  
  # ClickHouse 配置 (可選，如果不設置則只保存文件)
  clickhouse:
    enabled: false
    url: "http://localhost:8123"
    database: "hft_db"
    username: "hft_user"
    password: "hft_password"

# 開發環境配置
development:
  extends: default
  symbol: "BTCUSDT"
  date_range:
    start_date: "2024-07-01"
    end_date: "2024-07-01"  # 只下載一天進行測試
  performance:
    max_concurrent: 2
    batch_size: 1000
  clickhouse:
    enabled: true

# 生產環境配置
production:
  extends: default
  # 多個交易對批量下載
  symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "ADAUSDT"]
  data_type: "all"  # 下載所有類型
  date_range:
    days_back: 30  # 最近 30 天
  performance:
    max_concurrent: 8
    batch_size: 10000
    max_retries: 5
  clickhouse:
    enabled: true
    url: "http://localhost:8123"

# 測試配置
test:
  extends: default
  symbol: "SOLUSDT"
  date_range:
    start_date: "2024-06-01"
    end_date: "2024-06-02"
  performance:
    max_concurrent: 3
    batch_size: 2000
  clickhouse:
    enabled: true

# 歷史回測配置
backtest:
  extends: default
  symbols: ["BTCUSDT", "ETHUSDT"]
  data_type: "all"
  date_range:
    start_date: "2024-01-01"
    end_date: "2024-03-31"  # Q1 數據
  performance:
    max_concurrent: 6
    batch_size: 8000
  output:
    directory: "./backtest_data"
  clickhouse:
    enabled: true

# 實時訓練配置
realtime_training:
  extends: default
  symbol: "SOLUSDT"
  date_range:
    days_back: 7  # 最近一週
  performance:
    max_concurrent: 4
    batch_size: 5000
  clickhouse:
    enabled: true
  
  # 訓練特定配置
  training:
    enabled: true
    historical_days: 7
    pretrain_epochs: 20
    pretrain_batch_size: 512
    pretrain_lr: 0.001
    feature_dim: 64
    hidden_dim: 128
    model_save_path: "./models/realtime"

# 快速測試配置（最小資料集）
quick_test:
  extends: default
  symbol: "BTCUSDT"
  data_type: "depth"
  date_range:
    start_date: "2024-07-01"
    end_date: "2024-07-01"
  performance:
    max_concurrent: 2
    batch_size: 1000
    max_retries: 2
  clickhouse:
    enabled: true

# 大批量下載配置
bulk_download:
  extends: default
  symbols: [
    "BTCUSDT", "ETHUSDT", "SOLUSDT", "ADAUSDT", "BNBUSDT",
    "XRPUSDT", "DOGEUSDT", "AVAXUSDT", "DOTUSDT", "MATICUSDT"
  ]
  data_type: "all"
  date_range:
    days_back: 90  # 最近 3 個月
  performance:
    max_concurrent: 10
    batch_size: 15000
    max_retries: 5
  output:
    directory: "./bulk_historical_data"
  clickhouse:
    enabled: true
    # 可以使用不同的資料庫實例
    url: "http://localhost:8123"
    database: "hft_bulk_db"

# 特定交易對深度分析配置
depth_analysis:
  extends: default
  symbol: "BTCUSDT"
  data_type: "depth"
  date_range:
    start_date: "2024-06-01"
    end_date: "2024-06-30"  # 整個六月
  performance:
    max_concurrent: 6
    batch_size: 8000
  clickhouse:
    enabled: true
  output:
    directory: "./depth_analysis_data"

# CI/CD 測試配置
ci_test:
  extends: default
  symbol: "SOLUSDT"
  data_type: "depth"
  date_range:
    start_date: "2024-07-01"
    end_date: "2024-07-01"
  performance:
    max_concurrent: 1
    batch_size: 500
    max_retries: 2
  output:
    directory: "./ci_test_data"
  clickhouse:
    enabled: false  # CI 環境可能沒有 ClickHouse