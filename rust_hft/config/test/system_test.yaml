engine:
  queue_capacity: 32768
  stale_us: 3000
  top_n: 10
  flip_policy: OnUpdate

venues:
  - name: Bitget
    venue_type: Bitget
    ws_public: "wss://ws.bitget.com/v2/ws/public"
    ws_private: "wss://ws.bitget.com/v2/ws/private"
    rest: "https://api.bitget.com"
    api_key: "test_key"
    secret: "test_secret"
    capabilities:
      ws_order_placement: false
      snapshot_crc: false
      all_in_one_topics: true
      private_ws_heartbeat: true

strategies:
  - name: demo_trend
    strategy_type: Trend
    symbols: [BTCUSDT]
    params: { Trend: { ema_fast: 12, ema_slow: 26, rsi_period: 14 } }
    risk_limits: { max_notional: 100000, max_position: 1, daily_loss_limit: 1000, cooldown_ms: 0 }

risk:
  global_position_limit: 1000000
  global_notional_limit: 10000000
  max_daily_trades: 10000
  max_orders_per_second: 100
  staleness_threshold_us: 5000
