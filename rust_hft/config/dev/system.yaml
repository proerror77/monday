# HFT 系統配置
# 
# 環境變量展開支援：
# - 使用 ${VAR_NAME} 格式引用環境變量
# - 未設置的環境變量會保留原始格式並發出警告
# - 設置環境變量示例：export BITGET_API_KEY="your_api_key"
#
engine:
  queue_capacity: 32768
  stale_us: 3000
  top_n: 10
  flip_policy: "OnUpdate"

venues:
  - name: "bitget"
    venue_type: "Bitget"
    ws_public: "wss://ws.bitget.com/v2/ws/public"
    ws_private: "wss://ws.bitget.com/v2/ws/private"
    rest: "https://api.bitget.com"
    api_key: "${BITGET_API_KEY}"        # 從環境變量讀取 API Key
    secret: "${BITGET_SECRET}"          # 從環境變量讀取 Secret
    passphrase: "${BITGET_PASSPHRASE}"  # 從環境變量讀取 Passphrase
    execution_mode: "Paper"             # "Paper" | "Live"，預設為 Paper
    capabilities:
      ws_order_placement: true
      snapshot_crc: false
      all_in_one_topics: true
      private_ws_heartbeat: true

  - name: "binance"
    venue_type: "Binance"
    ws_public: "wss://stream.binance.com:9443/ws"
    ws_private: "wss://stream.binance.com:9443/ws"
    rest: "https://api.binance.com"
    api_key: "${BINANCE_API_KEY}"       # 從環境變量讀取 API Key
    secret: "${BINANCE_SECRET}"         # 從環境變量讀取 Secret
    execution_mode: "Paper"             # "Paper" | "Live"，預設為 Paper
    capabilities:
      ws_order_placement: true
      snapshot_crc: false
      all_in_one_topics: false
      private_ws_heartbeat: false

instruments:
  groups:
    - name: layer1
      symbols: ["ETHUSDT", "SOLUSDT", "SUIUSDT"]

strategies:
  templates:
    - id: trend_default
      strategy_type: Trend
      params:
        Trend:
          ema_fast: 12
          ema_slow: 26
          rsi_period: 14
      risk:
        max_notional: 10000.0
        max_position: 5.0
        daily_loss_limit: 500.0
        cooldown_ms: 1000

    - id: arbitrage_cross
      strategy_type: Arbitrage
      params:
        Arbitrage:
          min_spread_bps: 1.5
          max_position: 0.1
          execution_timeout_ms: 3000
      risk:
        max_notional: 12000.0
        max_position: 2.0
        daily_loss_limit: 400.0
        cooldown_ms: 2000

    - id: imbalance_lob
      strategy_type: Imbalance
      params:
        Imbalance:
          obi_threshold: 0.2   # 20% 不平衡
          lot: 0.01            # 下單數量
          top_levels: 5        # 使用前5檔計算
      risk:
        max_notional: 15000.0
        max_position: 3.0
        daily_loss_limit: 800.0
        cooldown_ms: 1000

  bindings:
    - template: trend_default
      apply_to: ["group:layer1"]
      overrides:
        ETHUSDT:
          risk: { max_notional: 15000.0, max_position: 3.0, daily_loss_limit: 800.0, cooldown_ms: 1000 }
        SOLUSDT:
          risk: { max_notional: 10000.0, max_position: 5.0, daily_loss_limit: 500.0, cooldown_ms: 1000 }
        SUIUSDT:
          risk: { max_notional: 8000.0,  max_position: 10.0, daily_loss_limit: 300.0, cooldown_ms: 1000 }

    - template: arbitrage_cross
      apply_to: ["group:layer1"]

    - template: imbalance_lob
      apply_to: ["group:layer1"]

# 🔥 Phase 1.5: 路由器配置 - 策略到場的映射
router:
  type: StrategyMap
  default_venue: BINANCE
  strategy_venues:
    # 基於策略實例 ID (template_id:SYMBOL) 進行路由
    trend_default:ETHUSDT: BINANCE
    trend_default:SOLUSDT: BITGET
    trend_default:SUIUSDT: BINANCE
    arbitrage_cross:ETHUSDT: BINANCE  # 跨場策略，指定主場
    arbitrage_cross:SOLUSDT: BITGET
    arbitrage_cross:SUIUSDT: BINANCE
    imbalance_lob:ETHUSDT: BINANCE
    imbalance_lob:SOLUSDT: BITGET
    imbalance_lob:SUIUSDT: BINANCE

risk:
  global_position_limit: 1000000.0
  global_notional_limit: 10000000.0
  max_daily_trades: 10000
  max_orders_per_second: 100
  staleness_threshold_us: 5000

# 基礎設施配置（可選）
infra:
  redis:
    url: "redis://localhost:6379"
  clickhouse:
    url: "http://localhost:8123"
    database: "hft"
