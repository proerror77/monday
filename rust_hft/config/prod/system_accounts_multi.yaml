# Legacy runtime schema（直接由 runtime 解析並展開 accounts -> venues）
# 使用三個交易所帳戶：Binance / Bitget / AsterDEX
# 注意：此檔案不包含 schema_version，走 runtime 直讀路徑

quotes_only: false

engine:
  queue_capacity: 32768
  stale_us: 500000
  top_n: 10
  flip_policy: { OnTimer: 100000 }
  ack_timeout_ms: 3000
  reconcile_interval_ms: 5000
  auto_cancel_exchange_only: false

accounts:
  - id: binance_main
    venue_type: Binance
    rest: "https://api.binance.com"
    ws_private: "wss://stream.binance.com:9443/ws"
    execution_mode: "Paper"   # Live / Paper
    credentials:
      api_key: "${BINANCE_API_KEY}"
      secret: "${BINANCE_SECRET}"

  - id: bitget_main
    venue_type: Bitget
    rest: "https://api.bitget.com"
    ws_private: "wss://ws.bitget.com/v2/ws/private"
    execution_mode: "Paper"
    credentials:
      api_key: "${BITGET_API_KEY}"
      secret: "${BITGET_SECRET}"
      passphrase: "${BITGET_PASSPHRASE}"

  - id: aster_main
    venue_type: Asterdex
    rest: "https://fapi.asterdex.com"
    ws_private: "wss://fstream.asterdex.com/ws"
    execution_mode: "Paper"
    credentials:
      api_key: "${ASTERDEX_API_KEY}"
      secret: "${ASTERDEX_SECRET}"

# 暫無策略，可保留為空；未來加策略後，請在下方綁定至對應 account_id
strategies: []

risk:
  risk_type: "Default"
  global_position_limit: 100
  global_notional_limit: 50000
  max_daily_trades: 2000
  max_orders_per_second: 50
  staleness_threshold_us: 300000
  enhanced: null
  strategy_overrides: {}

router: null
infra: null

# 策略→帳戶映射（示例，暫時無策略時保持空）
strategy_accounts: {}

