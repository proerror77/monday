engine:
  queue_capacity: 32768
  stale_us: 3000
  top_n: 10
  flip_policy: OnUpdate

venues:
  - name: Mock
    venue_type: Mock
    interval_ms: 500  # 500ms 間隔，更快看到結果
    capabilities:
      ws_order_placement: false
      snapshot_crc: false
      all_in_one_topics: true
      private_ws_heartbeat: true

strategies:
  - name: demo_trend
    strategy_type: Trend
    symbols: [BTCUSDT]
    params: !Trend
      ema_fast: 3      # 更快的短期 EMA，更快收斂
      ema_slow: 7      # 更快的長期 EMA，更快產生金叉
      rsi_period: 3    # 更短的 RSI 週期，更快產生信號
    risk_limits:
      max_notional: 100000
      max_position: 1
      daily_loss_limit: 1000
      cooldown_ms: 0

risk:
  global_position_limit: 1000000
  global_notional_limit: 10000000
  max_daily_trades: 10000
  max_orders_per_second: 100
  staleness_threshold_us: 5000