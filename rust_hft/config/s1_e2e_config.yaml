# S1 End-to-End Configuration
# 最小可用配置：展示完整的 Adapter→Engine→Strategy 數據流

system:
  name: "S1-E2E-Demo"
  version: "1.0.0"
  environment: "development"
  log_level: "info"

# Engine 核心配置
engine:
  # 事件攝取配置
  ingestion:
    queue_capacity: 8192
    stale_threshold_us: 3000
    flip_policy: "OnUpdate"      # OnUpdate, OnTimer, OnUtilization
    backpressure_policy: "LastWins"  # DropNew, LastWins, Block
  
  # 主循環配置  
  max_events_per_cycle: 50
  
  # 聚合配置
  aggregation:
    symbols: ["BTCUSDT"]        # 要聚合的品種
    top_n: 10                   # TopN 深度層數
    bar_intervals_ms: [60000, 300000]  # 1分鐘, 5分鐘 K線
    
# AdapterBridge 配置
adapter_bridge:
  max_concurrent_adapters: 2
  ingestion:
    queue_capacity: 4096
    stale_threshold_us: 3000
    flip_policy: "OnUpdate"
    backpressure_policy: "LastWins"

# Bitget 數據適配器配置
data_adapters:
  bitget:
    enabled: true
    ws_url: "wss://ws.bitget.com/spot/v1/stream"
    auto_reconnect: true
    heartbeat_interval_ms: 30000
    subscription_timeout_sec: 10
    
    # 訂閱配置
    channels:
      - channel: "books15"      # 15檔深度
        symbols: ["BTCUSDT"]
      - channel: "trade"        # 公共成交
        symbols: ["BTCUSDT"]

# 策略配置
strategies:
  trend:
    enabled: true
    symbol: "BTCUSDT"
    ema_fast_period: 12
    ema_slow_period: 26
    rsi_period: 14
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    position_size: 0.01
    max_position: 0.1
    min_spread_bps: 2.0
    
  arbitrage:
    enabled: true
    symbol: "BTCUSDT"
    min_spread_bps: 10.0
    max_position_size: 0.005
    max_total_position: 0.05
    max_stale_us: 3000
    min_profit_usd: 5.0
    taker_fee_rate: 0.001

# 風控配置
risk_management:
  max_drawdown_pct: 5.0
  max_position_per_symbol: 1.0
  max_orders_per_second: 10
  
# 執行配置 (S1 階段為 Paper 模式)
execution:
  mode: "paper"
  simulate_latency_us: 500
  simulate_slippage_bps: 1.0
  
# 監控配置
monitoring:
  print_statistics_interval_sec: 5
  snapshot_publish_frequency: "auto"  # auto, timer:1000, count:10
  
# 運行時配置
runtime:
  duration_sec: 30
  graceful_shutdown_timeout_sec: 5