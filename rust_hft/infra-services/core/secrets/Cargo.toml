[package]
name = "hft-infra-secrets"
version = "0.1.0"
edition = "2021"
description = "安全密鑰管理抽象層 (Secrets Manager)"

[dependencies]
hft-core = { package = "hft-core", path = "../../../market-core/core" }
tokio = { workspace = true, features = ["sync", "rt"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
zeroize = { version = "1.7", features = ["derive", "zeroize_derive"] }
async-trait = { workspace = true }

# 可選後端 (Phase 2)
# hashicorp_vault = { version = "0.12", optional = true }
# aws-config = { version = "1.0", optional = true }
# aws-sdk-secretsmanager = { version = "1.0", optional = true }

[features]
default = ["env-backend"]

env-backend = []
# vault-backend = ["dep:hashicorp_vault"]  # Phase 2
# aws-backend = ["dep:aws-config", "dep:aws-sdk-secretsmanager"]  # Phase 2

[lib]
name = "infra_secrets"
