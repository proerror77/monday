[package]
name = "hft-infra-venue"
version = "0.1.0"
edition = "2021"
description = "交易所規格配置加載與校驗"

[dependencies]
hft-core = { path = "../../../market-core/core" }
ports = { package = "hft-ports", path = "../../../market-core/ports" }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
tracing = "0.1"
tokio = { version = "1.0", features = ["fs"] }
rust_decimal = { version = "1.35", features = ["serde-with-str"] }

[lib]
name = "infra_venue"