[package]
name = "hft-ipc"
version = "0.1.0"
edition = "2021"
authors = ["HFT System <dev@hft.com>"]
description = "IPC control plane for HFT system using Unix Domain Sockets"

[dependencies]
tokio = { workspace = true, features = ["net", "io-util", "rt", "macros", "time", "sync"] }
serde = { workspace = true, features = ["derive"] }
rmp-serde = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true, features = ["serde"] }
rust_decimal = { workspace = true, features = ["serde-with-str"] }
async-trait = { workspace = true }

# Internal dependencies
hft-core = { path = "../../../market-core/core" }
shared_config = { package = "hft-shared-config", path = "../../../shared/config" }

[dev-dependencies]
tempfile = "3.8"
tokio-test = "0.4"
