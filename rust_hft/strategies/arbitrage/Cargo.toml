[package]
name = "hft-strategy-arbitrage"
version = "0.1.0"
edition = "2021"
description = "策略樣板：跨所 OrderBook/套利"

[dependencies]
hft_core = { package = "hft-core", path = "../../crates/core" }
ports = { package = "hft-ports", path = "../../crates/ports" }
serde = { workspace = true }
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
