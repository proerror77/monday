name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]
        features:
          - ""
          - "metrics"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Format (check)
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features "${{ matrix.features }}" -- -D warnings

      - name: Build
        run: cargo build --workspace --features "${{ matrix.features }}"

      - name: Test (runtime single-threaded)
        run: cargo test -p hft-runtime -- --test-threads=1

  smoke-quotes-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Build live app (binance)
        run: cargo build -p hft-live --features "binance"

      - name: Run quotes-only smoke (15s)
        env:
          RUST_LOG: info
        run: cargo run -p hft-live --features "binance" -- --config config/dev/binance_quotes_only.yaml --exit-after-ms 15000
