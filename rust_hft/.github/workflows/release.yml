name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  TZ: UTC
  LC_ALL: C
  LANG: C
  RELEASE_PACKAGES: hft-live hft-paper hft-replay hft-backtest hft-collector

jobs:
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x86_64-musl
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-15
            name: macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux linker
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang mold musl-tools

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure target linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Record cache dimensions
        id: cache-info
        shell: bash
        run: |
          echo "rust=$(rustc -Vv | awk '/^release:/ {print $2}')" >> "$GITHUB_OUTPUT"
          echo "sccache=$(${SCCACHE_PATH:-sccache} --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-rust-${{ steps.cache-info.outputs.rust }}-sccache-${{ steps.cache-info.outputs.sccache }}-${{ hashFiles('Cargo.lock') }}
          cache-all-crates: true

      - name: Set reproducible build metadata
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          for package in ${RELEASE_PACKAGES}; do
            cargo build --release --locked --target "${{ matrix.target }}" -p "${package}"
          done

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          package_dir="rust-hft-${{ matrix.name }}"
          mkdir -p "${package_dir}/bin" "${package_dir}/docs"

          for package in ${RELEASE_PACKAGES}; do
            cp "target/${{ matrix.target }}/release/${package}" "${package_dir}/bin/${package}"
          done

          cp README.md "${package_dir}/README.md"
          cp docs/guides/RUST_BUILD_RELEASE.md "${package_dir}/docs/RUST_BUILD_RELEASE.md"

          {
            echo "Rust HFT Trading System"
            echo "Version: ${GITHUB_REF_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Target: ${{ matrix.target }}"
            echo "Source-Date-Epoch: ${SOURCE_DATE_EPOCH}"
            echo "Packages: ${RELEASE_PACKAGES}"
          } > "${package_dir}/VERSION.txt"

          tar -czf "${package_dir}.tar.gz" "${package_dir}"
          shasum -a 256 "${package_dir}.tar.gz" > "${package_dir}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-hft-${{ matrix.name }}
          path: |
            rust-hft-${{ matrix.name }}.tar.gz
            rust-hft-${{ matrix.name }}.tar.gz.sha256
          retention-days: 14

      - name: sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats

  github-release:
    name: Publish GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
